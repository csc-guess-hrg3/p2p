<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fundo escuro -->
  <rect width="64" height="64" rx="10" fill="#0f172a"/>
  <!-- "HRG" em branco, ocupa metade esquerda -->
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif"
        font-size="24" font-weight="900" fill="#ffffff"
        text-anchor="end" letter-spacing="-0.5">HRG</text>
  <!-- Quadrado azul com "3" -->
  <rect x="36" y="22" width="22" height="22" rx="3" fill="#2563eb"/>
  <text x="47" y="40" font-family="Arial, Helvetica, sans-serif"
        font-size="18" font-weight="900" fill="#ffffff"
        text-anchor="middle">3</text>
</svg>
